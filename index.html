<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluación</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <div class="container">
        <div class="form-image">
            <img src="img/Logo-VG_Tpt02.png" alt="logo_VG" />
        </div>

        <div class="form-content">
            <form action="https://formsubmit.co/isael.fatama@vallegrande.edu.pe" method="POST">
                <div class="formulario">
                    <h2>Bienvenidos</h2>
            
                    <label for="opcion-sistemas">Análisis de sistemas</label>
                    <input type="radio" name="Carrera" id="opcion-sistemas" value="analisis-sistemas" required />
            
                    <label for="opcion-agraria">Producción agraria</label>
                    <input type="radio" name="Carrera" id="opcion-agraria" value="produccion-agraria" required />
            
                    <div class="input-group">
                        <label for="nombres">Nombres</label>
                        <input type="text" name="Nombres" id="nombres" placeholder="Nombres Completos"
                            pattern="[a-zA-Z ]+" title="Ingrese solo letras en este campo" required />
                        
                        <label for="apellidos">Apellidos</label>
                        <input type="text" name="Apellidos" id="apellidos" placeholder="Apellidos Completos"
                            pattern="[a-zA-Z ]+" title="Ingrese solo letras en este campo" required />
                        
            
                        <label for="edad">Edad</label>
                        <input type="number" name="Edad" id="edad" placeholder="Ingrese su edad" title="Ingrese solo números en este campo" required />
            
                        <label for="email">Correo</label>
                        <input type="email" name="Correo Electrónico" id="email"
                            placeholder="Ingrese su correo electrónico" required />
            
                        <label for="contraseña">Contraseña</label>
                        <input type="password" name="Contraseña" id="contraseña" placeholder="Ingrese su contraseña" required />
                    </div>
            
                    <a href="#">¿Olvidó su contraseña?</a>
            
                    <label for="check">Acepta la política y privacidad de los términos y condiciones?</label>
                    <input type="checkbox" name="politica_privacidad" id="check" required />
                            
                    <button type="submit">Registrarme</button>
            
                    <input type="hidden" name="_next" value="https://evaluacionif.netlify.app/" />
                    <input type="hidden" name="_captcha" value="false" />
                </div>
            </form>
            
        </div>
    </div>
</body>

</html>
